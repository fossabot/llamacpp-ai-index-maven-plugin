name: Publish
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven
      - name: Build
        run: mvn --batch-mode -DskipTests -Dmaven.javadoc.skip=true package
      - uses: actions/upload-artifact@v7
        with: { name: plugin-jars, path: target/*.jar }

  test:
    name: Test
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn --batch-mode verify
      - uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  report:
    name: Report
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with: { java-version: '8', distribution: temurin }
      - uses: actions/download-artifact@v8
        with: { name: jacoco-report, path: target/site/jacoco/ }
        continue-on-error: true
      - uses: advanced-security/maven-dependency-submission-action@v5
      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: target/site/jacoco/jacoco.xml
          format: jacoco
        continue-on-error: true
      - name: Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: target/site/jacoco/jacoco.xml
        continue-on-error: true

  check-snapshot:
    name: Check: main branch / SNAPSHOT
    needs: [report]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Confirm snapshot ref
        run: echo "Confirmed on snapshot ref ${{ github.ref }}"

  check-tag:
    name: Check: v* tag
    needs: [report]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Confirm tag ref
        run: echo "Confirmed on tag ${{ github.ref }}"

  github-snapshot:
    name: Update Snapshot Pre-release on GitHub
    needs: [check-snapshot]
    if: needs.check-snapshot.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: plugin-jars
          path: snapshot-assets/
      - name: Update snapshot pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view snapshot --repo ${{ github.repository }} 2>/dev/null \
            || gh release create snapshot \
                 --repo ${{ github.repository }} \
                 --prerelease \
                 --title "Snapshot (latest)" \
                 --notes "Latest snapshot build from the main branch."
          gh release upload snapshot snapshot-assets/* \
            --repo ${{ github.repository }} \
            --clobber

  publish-snapshot:
    name: Publish Snapshot to Central
    needs: [github-snapshot, check-snapshot]
    if: needs.check-snapshot.result == 'success'
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Deploy snapshot
        run: mvn --batch-mode deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}

  github-release:
    name: Attach Binaries to GitHub Release
    needs: [check-tag]
    if: needs.check-tag.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: plugin-jars
          path: release-assets/
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*

  publish-release:
    name: Publish Release to Central
    needs: [github-release, check-tag]
    if: needs.check-tag.result == 'success'
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: temurin
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Deploy release
        run: mvn --batch-mode -P release deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
